services:
  - type: web
    name: ea-remote-control
    runtime: python
    buildCommand: pip install -r remote/requirements.txt
    startCommand: gunicorn -w 1 -b 0.0.0.0:$PORT remote.run:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_ADMIN_CHANNEL_ID
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_CHAT_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
