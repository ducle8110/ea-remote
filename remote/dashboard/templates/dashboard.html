{% extends "base.html" %}
{% block title %}Dashboard - EA Remote Control{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="h5 mb-0">All Users</h2>
    <small id="lastUpdate" class="text-body-secondary"></small>
</div>

<div id="bulkBar" class="d-none align-items-center gap-2 mb-3">
    <span id="selCount" class="text-body-secondary small me-1">0 selected</span>
    <button class="btn btn-success btn-sm" onclick="doBulk('enable_trading')">Enable Trading</button>
    <button class="btn btn-danger btn-sm" onclick="doBulk('disable_trading')">Disable Trading</button>
</div>

<div class="card">
    <div class="table-responsive">
        <table class="table table-hover table-striped align-middle mb-0">
            <thead>
                <tr>
                    <th style="width:36px" class="text-center"><input class="form-check-input" type="checkbox" id="selectAll" onclick="toggleAll(this)"></th>
                    <th>Name</th>
                    <th>Account</th>
                    <th>Broker</th>
                    <th>Symbol</th>
                    <th>Balance</th>
                    <th>Equity</th>
                    <th>Profit</th>
                    <th>DD%</th>
                    <th>BUY</th>
                    <th>SELL</th>
                    <th>Spread</th>
                    <th>Status</th>
                    <th>Version</th>
                </tr>
            </thead>
            <tbody id="usersTable">
                <tr><td colspan="14" class="text-center text-body-secondary">
                    <div class="spinner-border spinner-border-sm me-2" role="status"></div>Loading...
                </td></tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const selectedIds = new Set();

function formatProfit(v) {
    const cls = v >= 0 ? 'text-success' : 'text-danger';
    return `<span class="${cls}">${v >= 0 ? '+' : ''}${v.toFixed(2)}</span>`;
}

function statusBadge(online, lastSeenAgo) {
    if (online) return '<span class="badge bg-success">ONLINE</span>';
    if (lastSeenAgo !== null && lastSeenAgo < 120)
        return `<span class="badge bg-warning text-dark">STALE ${lastSeenAgo}s</span>`;
    return '<span class="badge bg-danger">OFFLINE</span>';
}

function ddColor(dd) {
    if (dd >= 40) return 'text-danger';
    if (dd >= 25) return 'text-warning';
    return '';
}

function toggleSelect(uid, checked) {
    if (checked) selectedIds.add(uid);
    else selectedIds.delete(uid);
    updateBulkBar();
    syncSelectAll();
}

function toggleAll(master) {
    const boxes = document.querySelectorAll('#usersTable input[type=checkbox]');
    boxes.forEach(cb => {
        const uid = parseInt(cb.dataset.uid);
        cb.checked = master.checked;
        if (master.checked) selectedIds.add(uid);
        else selectedIds.delete(uid);
    });
    updateBulkBar();
}

function syncSelectAll() {
    const boxes = document.querySelectorAll('#usersTable input[type=checkbox]');
    document.getElementById('selectAll').checked =
        boxes.length > 0 && selectedIds.size === boxes.length;
}

function updateBulkBar() {
    const bar = document.getElementById('bulkBar');
    const count = selectedIds.size;
    bar.classList.toggle('d-none', count === 0);
    bar.classList.toggle('d-flex', count > 0);
    document.getElementById('selCount').textContent = count + ' selected';
}

async function doBulk(type) {
    if (selectedIds.size === 0) return;
    const action = type === 'enable_trading' ? 'ENABLE' : 'DISABLE';
    const ok = await showConfirm('Bulk Action', `${action} trading for ${selectedIds.size} bot(s)?`);
    if (!ok) return;

    try {
        const res = await fetch('/api/admin/bulk/command', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ user_ids: Array.from(selectedIds), type: type })
        });
        const data = await res.json();
        if (data.status === 'ok') {
            selectedIds.clear();
            updateBulkBar();
            document.getElementById('selectAll').checked = false;
            showToast(`${action} trading for ${data.processed} bot(s)`, 'success');
            refresh();
        } else {
            showToast('Error: ' + (data.error || 'Unknown'), 'danger');
        }
    } catch (e) {
        showToast('Request failed: ' + e.message, 'danger');
    }
}

async function refresh() {
    try {
        const res = await fetch('/api/admin/users');
        const users = await res.json();
        const tbody = document.getElementById('usersTable');

        if (users.length === 0) {
            tbody.innerHTML = '<tr><td colspan="14" class="text-center text-body-secondary">No users yet. <a href="/user/new">Create one</a></td></tr>';
            return;
        }

        const validIds = new Set(users.map(u => u.id));
        for (const id of selectedIds) {
            if (!validIds.has(id)) selectedIds.delete(id);
        }

        tbody.innerHTML = users.map(u => `
            <tr class="cursor-pointer" onclick="location.href='/user/${u.id}'">
                <td class="text-center" onclick="event.stopPropagation()">
                    <input class="form-check-input" type="checkbox" data-uid="${u.id}"
                           ${selectedIds.has(u.id) ? 'checked' : ''}
                           onchange="toggleSelect(${u.id}, this.checked)">
                </td>
                <td>
                    <strong>${u.name}</strong>
                    ${u.trading_enabled ? '' : ' <span class="badge bg-danger" style="font-size:9px;">DISABLED</span>'}
                </td>
                <td>${u.account_number || '-'}</td>
                <td>${u.broker || '-'}</td>
                <td>${u.symbol || '-'}</td>
                <td>${u.balance.toFixed(2)}</td>
                <td>${u.equity.toFixed(2)}</td>
                <td>${formatProfit(u.profit)}</td>
                <td class="${ddColor(u.dd_pct)}">${u.dd_pct.toFixed(1)}%</td>
                <td>${u.buy_count}</td>
                <td>${u.sell_count}</td>
                <td>${u.spread_pip.toFixed(1)}</td>
                <td>${statusBadge(u.online, u.last_seen_ago)}</td>
                <td>${u.ea_version || '-'}</td>
            </tr>
        `).join('');

        syncSelectAll();
        updateBulkBar();
        document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();
    } catch (e) {
        console.error('Refresh failed:', e);
    }
}

refresh();
setInterval(refresh, 5000);
</script>
{% endblock %}
