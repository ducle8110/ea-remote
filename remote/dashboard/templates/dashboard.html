{% extends "base.html" %}
{% block title %}Dashboard - EA Remote Control{% endblock %}
{% block content %}
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
    <h2 style="font-size:20px;">All Users</h2>
    <span id="lastUpdate" style="color:var(--text2);font-size:12px;"></span>
</div>

<div id="bulkBar" style="display:none;margin-bottom:12px;align-items:center;gap:10px;">
    <span id="selCount" style="color:var(--text2);font-size:13px;margin-right:4px;">0 selected</span>
    <button class="btn btn-success" onclick="bulkCommand('enable_trading')">Enable Trading</button>
    <button class="btn btn-danger" onclick="bulkCommand('disable_trading')">Disable Trading</button>
</div>

<div class="card" style="padding:0;overflow:auto;">
    <table>
        <thead>
            <tr>
                <th style="width:36px;text-align:center;"><input type="checkbox" id="selectAll" onclick="toggleAll(this)"></th>
                <th>Name</th>
                <th>Account</th>
                <th>Broker</th>
                <th>Symbol</th>
                <th>Balance</th>
                <th>Equity</th>
                <th>Profit</th>
                <th>DD%</th>
                <th>BUY</th>
                <th>SELL</th>
                <th>Spread</th>
                <th>Status</th>
                <th>Version</th>
            </tr>
        </thead>
        <tbody id="usersTable">
            <tr><td colspan="14" style="text-align:center;color:var(--text2);">Loading...</td></tr>
        </tbody>
    </table>
</div>
{% endblock %}

{% block scripts %}
<script>
const selectedIds = new Set();

function formatProfit(v) {
    const cls = v >= 0 ? 'profit-pos' : 'profit-neg';
    return `<span class="${cls}">${v >= 0 ? '+' : ''}${v.toFixed(2)}</span>`;
}

function statusBadge(online, lastSeenAgo) {
    if (online) return '<span class="badge badge-online">ONLINE</span>';
    if (lastSeenAgo !== null && lastSeenAgo < 120)
        return `<span class="badge badge-stale">STALE ${lastSeenAgo}s</span>`;
    return '<span class="badge badge-offline">OFFLINE</span>';
}

function ddColor(dd) {
    if (dd >= 40) return 'profit-neg';
    if (dd >= 25) return 'color:var(--yellow)';
    return '';
}

function toggleSelect(uid, checked) {
    if (checked) selectedIds.add(uid);
    else selectedIds.delete(uid);
    updateBulkBar();
    syncSelectAll();
}

function toggleAll(master) {
    const boxes = document.querySelectorAll('#usersTable input[type=checkbox]');
    boxes.forEach(cb => {
        const uid = parseInt(cb.dataset.uid);
        cb.checked = master.checked;
        if (master.checked) selectedIds.add(uid);
        else selectedIds.delete(uid);
    });
    updateBulkBar();
}

function syncSelectAll() {
    const boxes = document.querySelectorAll('#usersTable input[type=checkbox]');
    document.getElementById('selectAll').checked =
        boxes.length > 0 && selectedIds.size === boxes.length;
}

function updateBulkBar() {
    const bar = document.getElementById('bulkBar');
    const count = selectedIds.size;
    bar.style.display = count > 0 ? 'flex' : 'none';
    document.getElementById('selCount').textContent = count + ' selected';
}

async function bulkCommand(type) {
    if (selectedIds.size === 0) return;
    const action = type === 'enable_trading' ? 'ENABLE' : 'DISABLE';
    if (!confirm(`${action} trading for ${selectedIds.size} bot(s)?`)) return;

    try {
        const res = await fetch('/api/admin/bulk/command', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ user_ids: Array.from(selectedIds), type: type })
        });
        const data = await res.json();
        if (data.status === 'ok') {
            selectedIds.clear();
            updateBulkBar();
            document.getElementById('selectAll').checked = false;
            refresh();
        } else {
            alert('Error: ' + (data.error || 'Unknown'));
        }
    } catch (e) {
        alert('Request failed: ' + e.message);
    }
}

async function refresh() {
    try {
        const res = await fetch('/api/admin/users');
        const users = await res.json();
        const tbody = document.getElementById('usersTable');

        if (users.length === 0) {
            tbody.innerHTML = '<tr><td colspan="14" style="text-align:center;color:var(--text2);">No users yet. <a href="/user/new">Create one</a></td></tr>';
            return;
        }

        // Remove stale selections (user deleted/deactivated)
        const validIds = new Set(users.map(u => u.id));
        for (const id of selectedIds) {
            if (!validIds.has(id)) selectedIds.delete(id);
        }

        tbody.innerHTML = users.map(u => `
            <tr style="cursor:pointer" onclick="location.href='/user/${u.id}'">
                <td style="text-align:center;" onclick="event.stopPropagation()">
                    <input type="checkbox" data-uid="${u.id}"
                           ${selectedIds.has(u.id) ? 'checked' : ''}
                           onchange="toggleSelect(${u.id}, this.checked)">
                </td>
                <td>
                    <strong>${u.name}</strong>
                    ${u.trading_enabled ? '' : ' <span class="badge badge-offline" style="font-size:9px;">DISABLED</span>'}
                </td>
                <td>${u.account_number || '-'}</td>
                <td>${u.broker || '-'}</td>
                <td>${u.symbol || '-'}</td>
                <td>${u.balance.toFixed(2)}</td>
                <td>${u.equity.toFixed(2)}</td>
                <td>${formatProfit(u.profit)}</td>
                <td class="${ddColor(u.dd_pct)}">${u.dd_pct.toFixed(1)}%</td>
                <td>${u.buy_count}</td>
                <td>${u.sell_count}</td>
                <td>${u.spread_pip.toFixed(1)}</td>
                <td>${statusBadge(u.online, u.last_seen_ago)}</td>
                <td>${u.ea_version || '-'}</td>
            </tr>
        `).join('');

        syncSelectAll();
        updateBulkBar();
        document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();
    } catch (e) {
        console.error('Refresh failed:', e);
    }
}

refresh();
setInterval(refresh, 5000);
</script>
{% endblock %}
