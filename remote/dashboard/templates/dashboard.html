{% extends "base.html" %}
{% block title %}Dashboard - EA Remote Control{% endblock %}
{% block content %}
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
    <h2 style="font-size:20px;">All Users</h2>
    <span id="lastUpdate" style="color:var(--text2);font-size:12px;"></span>
</div>

<div class="card" style="padding:0;overflow:auto;">
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Account</th>
                <th>Broker</th>
                <th>Symbol</th>
                <th>Balance</th>
                <th>Equity</th>
                <th>Profit</th>
                <th>DD%</th>
                <th>BUY</th>
                <th>SELL</th>
                <th>Spread</th>
                <th>Status</th>
                <th>Version</th>
            </tr>
        </thead>
        <tbody id="usersTable">
            <tr><td colspan="13" style="text-align:center;color:var(--text2);">Loading...</td></tr>
        </tbody>
    </table>
</div>
{% endblock %}

{% block scripts %}
<script>
function formatProfit(v) {
    const cls = v >= 0 ? 'profit-pos' : 'profit-neg';
    return `<span class="${cls}">${v >= 0 ? '+' : ''}${v.toFixed(2)}</span>`;
}

function statusBadge(online, lastSeenAgo) {
    if (online) return '<span class="badge badge-online">ONLINE</span>';
    if (lastSeenAgo !== null && lastSeenAgo < 120)
        return `<span class="badge badge-stale">STALE ${lastSeenAgo}s</span>`;
    return '<span class="badge badge-offline">OFFLINE</span>';
}

function ddColor(dd) {
    if (dd >= 40) return 'profit-neg';
    if (dd >= 25) return 'color:var(--yellow)';
    return '';
}

async function refresh() {
    try {
        const res = await fetch('/api/admin/users');
        const users = await res.json();
        const tbody = document.getElementById('usersTable');

        if (users.length === 0) {
            tbody.innerHTML = '<tr><td colspan="13" style="text-align:center;color:var(--text2);">No users yet. <a href="/user/new">Create one</a></td></tr>';
            return;
        }

        tbody.innerHTML = users.map(u => `
            <tr style="cursor:pointer" onclick="location.href='/user/${u.id}'">
                <td><strong>${u.name}</strong></td>
                <td>${u.account_number || '-'}</td>
                <td>${u.broker || '-'}</td>
                <td>${u.symbol || '-'}</td>
                <td>${u.balance.toFixed(2)}</td>
                <td>${u.equity.toFixed(2)}</td>
                <td>${formatProfit(u.profit)}</td>
                <td class="${ddColor(u.dd_pct)}">${u.dd_pct.toFixed(1)}%</td>
                <td>${u.buy_count}</td>
                <td>${u.sell_count}</td>
                <td>${u.spread_pip.toFixed(1)}</td>
                <td>${statusBadge(u.online, u.last_seen_ago)}</td>
                <td>${u.ea_version || '-'}</td>
            </tr>
        `).join('');

        document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();
    } catch (e) {
        console.error('Refresh failed:', e);
    }
}

refresh();
setInterval(refresh, 5000);
</script>
{% endblock %}
