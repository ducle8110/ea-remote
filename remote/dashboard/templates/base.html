<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EA Remote Control{% endblock %}</title>
    <style>
        :root {
            --bg: #0f1117; --bg2: #1a1d28; --bg3: #242836;
            --text: #e1e4ea; --text2: #8b8fa3; --accent: #4f8cff;
            --green: #34d399; --red: #f87171; --yellow: #fbbf24;
            --border: #2d3148;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .navbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        .navbar h1 { font-size: 18px; font-weight: 600; }
        .navbar nav a { margin-left: 20px; color: var(--text2); font-size: 14px; }
        .navbar nav a:hover { color: var(--text); }

        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .badge-online { background: rgba(52,211,153,0.15); color: var(--green); }
        .badge-offline { background: rgba(248,113,113,0.15); color: var(--red); }
        .badge-stale { background: rgba(251,191,36,0.15); color: var(--yellow); }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px 12px; background: var(--bg3); color: var(--text2); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
        tr:hover td { background: var(--bg2); }

        .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
        .card h2 { font-size: 16px; margin-bottom: 12px; color: var(--text2); }

        .btn { display: inline-block; padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-danger { background: var(--red); color: #fff; }
        .btn-success { background: var(--green); color: #000; }
        .btn:hover { opacity: 0.85; }

        input, select { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 14px; }
        input:focus, select:focus { outline: none; border-color: var(--accent); }
        label { display: block; color: var(--text2); font-size: 12px; margin-bottom: 4px; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

        .profit-pos { color: var(--green); }
        .profit-neg { color: var(--red); }

        .flash { padding: 10px 16px; border-radius: 6px; margin-bottom: 16px; }
        .flash-error { background: rgba(248,113,113,0.15); color: var(--red); }

        .stat-value { font-size: 24px; font-weight: 700; }
        .stat-label { font-size: 12px; color: var(--text2); }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>EA Remote Control</h1>
        <nav>
            <a href="{{ url_for('dashboard.index') }}">Dashboard</a>
            <a href="{{ url_for('dashboard.new_user') }}">+ User</a>
            <a href="{{ url_for('dashboard.logs') }}">Logs</a>
            <a href="{{ url_for('dashboard.logout') }}">Logout</a>
        </nav>
    </div>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
        <div class="flash flash-{{ cat }}">{{ msg }}</div>
        {% endfor %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
