{% extends "base.html" %}
{% block title %}New User - EA Remote Control{% endblock %}
{% block content %}
<div class="col-md-6">
    <h2 class="h5 mb-3">Create New User</h2>
    <div class="card">
        <div class="card-body">
            <form id="createForm">
                <div class="mb-3">
                    <label class="form-label">Name *</label>
                    <input type="text" class="form-control" name="name" id="name" required placeholder="Client A">
                </div>
                <div class="mb-3">
                    <label class="form-label">Note</label>
                    <input type="text" class="form-control" name="note" id="note" placeholder="Optional notes">
                </div>
                <button type="submit" class="btn btn-primary">Create User</button>
            </form>
            <div id="result" class="mt-3 d-none">
                <div class="alert alert-success">User created!</div>
                <label class="form-label">API Key (copy and give to user):</label>
                <code id="apiKey" class="d-block p-2 bg-body-tertiary rounded user-select-all text-break"></code>
                <a id="goDetail" href="#" class="btn btn-primary mt-3">Go to User Detail &rarr;</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('createForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
        name: document.getElementById('name').value,
        note: document.getElementById('note').value,
    };
    const res = await fetch('/api/admin/user', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });
    const d = await res.json();
    if (d.api_key) {
        document.getElementById('apiKey').textContent = d.api_key;
        document.getElementById('goDetail').href = '/user/' + d.id;
        document.getElementById('result').classList.remove('d-none');
    }
});
</script>
{% endblock %}
